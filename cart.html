<!DOCTYPE html>
<html lang="en">
<head>

    <!-- ✅ FIXED VIEWPORT -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta charset="UTF-8">
    <title>Sizzle - Cart</title>
    <link rel="stylesheet" href="style.css">

    <!-- 🔥 Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="header">
    <img src="images/logo.png" class="logo">
    <div id="authBtn" class="auth-btn">Login</div>
</div>

<div class="categories">
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="orders.html">Orders</a>
</div>

<h2 class="section-title">Your Cart</h2>

<div class="order-box" id="cart-items">
    <p>No items added yet</p>
</div>

<div class="order-box">
    <h2>Payment</h2>

    <!-- ✅ ADDED oninput -->
    <input class="name-input" placeholder="Your Name" oninput="saveForm()">
    <input class="phone-input" placeholder="Phone Number" oninput="saveForm()">

    <div class="address-row">
        <input class="address-input" placeholder="Address" oninput="saveForm()">
        <button class="location-btn" onclick="getLocation()">📍</button>
    </div>

    <!-- ✅ ADDED oninput -->
    <textarea class="comment-input" placeholder="Add notes (no onions, extra sauce)" oninput="saveForm()"></textarea>

    <!-- ✅ ADDED onchange -->
    <select onchange="saveForm()">
        <option>Cash</option>
        <option>Card on Delivery</option>
    </select>

    <button id="orderBtn" onclick="placeOrder()">Place Order</button>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA0NPkfK_jdoF95XAy0m_dHrFxmTyTr7kE",
    authDomain: "sizzle-oman.firebaseapp.com",
    projectId: "sizzle-oman",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

if (!localStorage.getItem("guestId")) {
    localStorage.setItem("guestId", Date.now().toString());
}

// 🔐 LOGIN BUTTON
window.onload = function () {

    const btn = document.getElementById("authBtn");

    auth.onAuthStateChanged(user => {
        btn.innerHTML = user ? "👤" : "Login";

        if (user) {
            const pending = localStorage.getItem("pendingOrder");

            if (pending) {
                const orderData = JSON.parse(pending);

                setTimeout(() => {
                    submitOrder(orderData);
                }, 500);
            }
        }
    });

    btn.onclick = function () {
        window.location.href = auth.currentUser ? "profile.html" : "login.html";
    };

    // ✅ LOAD SAVED FORM (ADDED)
    const saved = JSON.parse(localStorage.getItem("orderForm"));
    if (saved) {
        document.querySelector(".name-input").value = saved.name || "";
        document.querySelector(".phone-input").value = saved.phone || "";
        document.querySelector(".address-input").value = saved.address || "";
        document.querySelector(".comment-input").value = saved.comment || "";
        document.querySelector("select").value = saved.paymentType || "Cash";
    }

    loadCart();
};


// 🛒 LOAD CART
function loadCart() {

    const cart = JSON.parse(localStorage.getItem("cart")) || {};
    const container = document.getElementById("cart-items");

    container.innerHTML = "";

    let subtotal = 0;
    const items = Object.entries(cart);

    if (items.length === 0) {
        container.innerHTML = "<p>No items added yet</p>";
        return;
    }

    let html = "";

    items.forEach(([id, data]) => {

        if (!data || !data.qty || !data.price) return;

        const itemTotal = data.qty * data.price;
        subtotal += itemTotal;

        html += `
        <div class="receipt-item">
            <div class="receipt-left">
                <span>${id.replace(/_/g, " ")}</span>
            </div>

            <div class="receipt-right">
                <div class="qty-controls">
                    <button onclick="changeCartQty('${id}', -1)">-</button>
                    <span>${data.qty}</span>
                    <button onclick="changeCartQty('${id}', 1)">+</button>
                </div>
                <span class="item-total">${itemTotal.toFixed(2)} OMR</span>
            </div>
        </div>
        `;
    });

    const tax = Math.round(subtotal * 0.05 * 100) / 100;
    const total = Math.round((subtotal + tax) * 100) / 100;

    html += `
    <div class="receipt-summary">
        <div class="summary-row">
            <span>Subtotal</span>
            <span>${subtotal.toFixed(2)} OMR</span>
        </div>

        <div class="summary-row">
            <span>Tax (5%)</span>
            <span>${tax.toFixed(2)} OMR</span>
        </div>

        <div class="summary-row total">
            <span>Total</span>
            <span>${total.toFixed(2)} OMR</span>
        </div>
    </div>
    `;

    container.innerHTML = html;
}


// ➕➖ CHANGE QTY
function changeCartQty(id, change) {

    let cart = JSON.parse(localStorage.getItem("cart")) || {};

    if (!cart[id]) return;

    cart[id].qty += change;

    if (cart[id].qty <= 0) delete cart[id];

    localStorage.setItem("cart", JSON.stringify(cart));

    loadCart();
}


// 📍 LOCATION
function getLocation() {

    navigator.geolocation.getCurrentPosition(
        pos => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            document.querySelector(".address-input").value =
                `https://maps.google.com/?q=${lat},${lng}`;

            saveForm(); // ✅ ADDED
        },
        () => alert("Location failed. Turn on GPS."),
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
}


// ✅ SAVE FORM FUNCTION (ADDED)
function saveForm() {
    const data = {
        name: document.querySelector(".name-input").value,
        phone: document.querySelector(".phone-input").value,
        address: document.querySelector(".address-input").value,
        comment: document.querySelector(".comment-input").value,
        paymentType: document.querySelector("select").value
    };

    localStorage.setItem("orderForm", JSON.stringify(data));
}


// 🚀 PLACE ORDER
async function placeOrder() {

    const cart = JSON.parse(localStorage.getItem("cart")) || {};

    const name = document.querySelector(".name-input").value;
    const phone = document.querySelector(".phone-input").value;
    const address = document.querySelector(".address-input").value;
    const paymentType = document.querySelector("select").value;
    const comment = document.querySelector(".comment-input").value;

    // ✅ SAVE BEFORE ORDER (ADDED)
    localStorage.setItem("orderForm", JSON.stringify({
        name, phone, address, comment, paymentType
    }));

    if (!name || !phone || !address) {
        alert("Fill all fields");
        return;
    }

    if (Object.keys(cart).length === 0) {
        alert("Cart is empty");
        return;
    }

    submitOrder({ name, phone, address, paymentType, comment, cart });
}


// ✅ SUBMIT ORDER
async function submitOrder(orderData) {

    const btn = document.getElementById("orderBtn");
    btn.disabled = true;

    try {
        const doc = await db.collection("settings").doc("restaurant").get();

        if (!doc.exists || !doc.data().open) {
            alert("Restaurant is CLOSED");
            btn.disabled = false;
            return;
        }

        const user = auth.currentUser;

        await db.collection("orders").add({
            ...orderData,
            userId: user 
                ? user.uid 
                : "guest_" + localStorage.getItem("guestId"),
            time: new Date()
        });

        const box = document.querySelector(".order-box:last-of-type");
        box.innerHTML += `<div class="success-msg">✅ Order placed successfully!</div>`;

        localStorage.removeItem("cart");
        localStorage.removeItem("pendingOrder");

        // ✅ CLEAR SAVED FORM (ADDED)
        localStorage.removeItem("orderForm");

        document.querySelector(".name-input").value = "";
        document.querySelector(".phone-input").value = "";
        document.querySelector(".address-input").value = "";
        document.querySelector(".comment-input").value = "";
        document.querySelector("select").value = "Cash";

        loadCart();

    } catch (err) {
        console.error(err);
        alert("Order failed");
    }

    btn.disabled = false;
}
</script>

<style>
html, body {
    touch-action: manipulation;
    overflow-x: hidden;
}

input, select, textarea {
    font-size: 16px !important;
}

.auth-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: #f5e6d3;
    color: #ad0202;
    padding: 10px 16px;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

.order-box {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.order-box input, .order-box select, .comment-input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #f5e6d3;
    color: #b30000;
    font-weight: bold;
    box-sizing: border-box;
}

.comment-input {
    margin-bottom: 12px;
    min-height: 80px;
    resize: none;
}

.address-row {
    display: flex;
    gap: 10px;
    width: 100%;
}

.address-input {
    flex: 1;
}

.location-btn {
    width: 50px;
    min-width: 50px;
    height: 48px;
    border: none;
    border-radius: 10px;
    background: #f5e6d3;
    color: #b30000;
    cursor: pointer;
    font-size: 18px;
}

.order-box button {
    width: 100%;
    height: 48px;
    border: none;
    border-radius: 10px;
    background: #f5e6d3;
    color: #b30000;
    font-weight: bold;
    cursor: pointer;
}

.success-msg {
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    background: #d4edda;
    color: #155724;
    font-weight: bold;
    text-align: center;
}
</style>

</body>
</html>
