<!DOCTYPE html>
<html lang="en">
<head>

<!-- ✅ VIEWPORT -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta charset="UTF-8">
<title>Sizzle - Cart</title>

<link rel="stylesheet" href="style.css">

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- 🔴 HEADER -->
<div class="header">
    <img src="./images/logo.png" class="logo">
    <div id="authBtn" class="auth-btn">Login</div>
</div>

<!-- NAV -->
<div class="categories">
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="orders.html">Orders</a>
</div>

<h2 class="section-title">Your Cart</h2>

<!-- 🔥 ORDER TYPE TABS -->
<div class="type-tabs">
    <button id="deliveryTab" class="active" onclick="setOrderType('delivery')">🚚 Delivery</button>
    <button id="pickupTab" onclick="setOrderType('pickup')">🛍 Pickup</button>
</div>

<!-- CART -->
<div class="order-box" id="cart-items">
    <p>No items added yet</p>
</div>

<!-- FORM -->
<div class="order-box">

    <h2>Order Details</h2>

    <input class="name-input" placeholder="Your Name" oninput="saveForm()">
    <input class="phone-input" placeholder="Phone Number" oninput="saveForm()">

    <!-- DELIVERY ONLY -->
    <div id="deliveryFields">

        <div class="address-row">
            <input class="address-input" placeholder="Address" oninput="saveForm()">
            <button class="location-btn" onclick="getLocation()">📍</button>
        </div>

        <select onchange="saveForm()" class="payment-select">
            <option>Cash</option>
            <option>Card on Delivery</option>
        </select>

    </div>

    <textarea class="comment-input" placeholder="Add notes (no onions, extra sauce)" oninput="saveForm()"></textarea>

    <button id="orderBtn" onclick="placeOrder()">Place Order</button>

</div>

<script>

/* 🔥 GLOBAL ORDER TYPE */
let orderType = "delivery";

/* 🔥 SWITCH TYPE */
function setOrderType(type){
    orderType = type;

    document.getElementById("deliveryTab").classList.remove("active");
    document.getElementById("pickupTab").classList.remove("active");

    if(type === "delivery"){
        document.getElementById("deliveryTab").classList.add("active");
        document.getElementById("deliveryFields").style.display = "block";
    } else {
        document.getElementById("pickupTab").classList.add("active");
        document.getElementById("deliveryFields").style.display = "none";
    }

    saveForm();
}

const firebaseConfig = {
    apiKey: "AIzaSyA0NPkfK_jdoF95XAy0m_dHrFxmTyTr7kE",
    authDomain: "sizzle-oman.firebaseapp.com",
    projectId: "sizzle-oman",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

/* GUEST */
if (!localStorage.getItem("guestId")) {
    localStorage.setItem("guestId", Date.now().toString());
}

/* 🔐 AUTH */
window.onload = function () {

    const btn = document.getElementById("authBtn");

    auth.onAuthStateChanged(user => {
        btn.innerHTML = user ? "👤" : "Login";

        if (user) {
            const pending = localStorage.getItem("pendingOrder");

            if (pending) {
                const orderData = JSON.parse(pending);

                setTimeout(() => {
                    submitOrder(orderData);
                }, 500);
            }
        }
    });

    btn.onclick = function () {
        window.location.href = auth.currentUser ? "profile.html" : "login.html";
    };

    /* LOAD SAVED */
    const saved = JSON.parse(localStorage.getItem("orderForm"));
    if (saved) {

        document.querySelector(".name-input").value = saved.name || "";
        document.querySelector(".phone-input").value = saved.phone || "";
        document.querySelector(".address-input").value = saved.address || "";
        document.querySelector(".comment-input").value = saved.comment || "";
        document.querySelector(".payment-select").value = saved.paymentType || "Cash";

        if(saved.orderType){
            setOrderType(saved.orderType);
        }
    }

    loadCart();
};

/* CART */
function loadCart() {

    const cart = JSON.parse(localStorage.getItem("cart")) || {};
    const container = document.getElementById("cart-items");

    container.innerHTML = "";

    let subtotal = 0;
    const items = Object.entries(cart);

    if (items.length === 0) {
        container.innerHTML = "<p>No items added yet</p>";
        return;
    }

    let html = "";

    items.forEach(([id, data]) => {

        if (!data || !data.qty || !data.price) return;

        const itemTotal = data.qty * data.price;
        subtotal += itemTotal;

        html += `
        <div class="receipt-item">
            <div class="receipt-left">
                <span>${id.replace(/_/g, " ")}</span>
            </div>

            <div class="receipt-right">
                <div class="qty-controls">
                    <button onclick="changeCartQty('${id}', -1)">-</button>
                    <span>${data.qty}</span>
                    <button onclick="changeCartQty('${id}', 1)">+</button>
                </div>
                <span class="item-total">${itemTotal.toFixed(2)} OMR</span>
            </div>
        </div>
        `;
    });

    const total = Math.round(subtotal * 1.05 * 100) / 100;

    html += `
    <div class="receipt-summary">
        <div class="summary-row total">
            <span>Total (incl. 5%)</span>
            <span>${total.toFixed(2)} OMR</span>
        </div>
    </div>
    `;

    container.innerHTML = html;
}

/* QTY */
function changeCartQty(id, change) {

    let cart = JSON.parse(localStorage.getItem("cart")) || {};

    if (!cart[id]) return;

    cart[id].qty += change;

    if (cart[id].qty <= 0) delete cart[id];

    localStorage.setItem("cart", JSON.stringify(cart));

    loadCart();
}

/* LOCATION */
function getLocation() {

    navigator.geolocation.getCurrentPosition(
        pos => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            document.querySelector(".address-input").value =
                `https://maps.google.com/?q=${lat},${lng}`;

            saveForm();
        },
        () => alert("Location failed."),
        { enableHighAccuracy: true }
    );
}

/* SAVE */
function saveForm() {

    const data = {
        name: document.querySelector(".name-input").value,
        phone: document.querySelector(".phone-input").value,
        address: document.querySelector(".address-input")?.value || "",
        comment: document.querySelector(".comment-input").value,
        paymentType: document.querySelector(".payment-select")?.value || "",
        orderType
    };

    localStorage.setItem("orderForm", JSON.stringify(data));
}

/* PLACE */
async function placeOrder() {

    const cart = JSON.parse(localStorage.getItem("cart")) || {};

    const name = document.querySelector(".name-input").value;
    const phone = document.querySelector(".phone-input").value;
    const address = document.querySelector(".address-input").value;
    const paymentType = document.querySelector(".payment-select").value;
    const comment = document.querySelector(".comment-input").value;

    if (!name || !phone) {
        alert("Fill required fields");
        return;
    }

    if (orderType === "delivery" && !address) {
        alert("Address required for delivery");
        return;
    }

    submitOrder({
        name,
        phone,
        address,
        paymentType,
        comment,
        cart,
        orderType
    });
}

/* SUBMIT */
async function submitOrder(orderData) {

    const btn = document.getElementById("orderBtn");
    btn.disabled = true;

    try {

        const doc = await db.collection("settings").doc("restaurant").get();

        if (!doc.exists || !doc.data().open) {
            alert("Restaurant is CLOSED");
            btn.disabled = false;
            return;
        }

        const user = auth.currentUser;

        await db.collection("orders").add({
            ...orderData,
            userId: user 
                ? user.uid 
                : "guest_" + localStorage.getItem("guestId"),
            time: new Date()
        });

        const box = document.querySelector(".order-box:last-of-type");
        box.innerHTML += `<div class="success-msg">✅ Order placed!</div>`;

        localStorage.removeItem("cart");
        localStorage.removeItem("pendingOrder");
        localStorage.removeItem("orderForm");

        document.querySelector(".name-input").value = "";
        document.querySelector(".phone-input").value = "";
        document.querySelector(".address-input").value = "";
        document.querySelector(".comment-input").value = "";
        document.querySelector(".payment-select").value = "Cash";

        loadCart();

    } catch (err) {
        console.error(err);
        alert("Order failed");
    }

    btn.disabled = false;
}

</script>

<style>

/* TABS */
.type-tabs {
    display:flex;
    margin:15px;
    border-radius:10px;
    overflow:hidden;
}

.type-tabs button {
    flex:1;
    padding:12px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    background:#ddd;
}

.type-tabs .active {
    background:#ad0202;
    color:white;
}

</style>

</body>
</html>
