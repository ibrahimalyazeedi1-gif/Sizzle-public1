<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>Sizzle - Cart</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>

/* 🔴 BASE */
body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#d9c3a3;
}

/* 🔴 HEADER */
.header {
    background:#ad0202;
    padding:20px;
    text-align:center;
    position:relative;
}

.logo {
    height:70px;
    display:block;
    margin:0 auto;
}

/* LOGIN */
.auth-btn {
    position:absolute;
    top:15px;
    right:15px;
    background:#f5e6d3;
    color:#ad0202;
    padding:10px 16px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* NAV */
.categories {
    display:flex;
    justify-content:center;
    gap:10px;
    background:#7a0000;
    padding:10px;
}

.categories a {
    color:white;
    text-decoration:none;
    background:#a83232;
    padding:8px 14px;
    border-radius:20px;
}

/* TITLE */
.section-title {
    text-align:center;
    margin-top:15px;
}

/* 🔥 TABS FIXED */
.type-tabs {
    display:flex;
    width:90%;
    max-width:450px;
    margin:15px auto;
    border-radius:12px;
    overflow:hidden;
    background:#ccc;
}

.type-tabs button {
    flex:1;
    padding:10px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    background:transparent;
}

.type-tabs .active {
    background:#ad0202;
    color:white;
}

/* 🔥 ORDER BOX */
.order-box {
    width:90%;
    max-width:450px;
    margin:15px auto;
    background:#7a0000;
    padding:15px;
    border-radius:12px;
    color:white;

    display:flex;
    flex-direction:column;
    gap:12px;
}

/* INPUTS */
.order-box input,
.order-box select,
.comment-input {
    width:100%;
    padding:14px;
    border-radius:10px;
    border:none;
    background:#f5e6d3;
    color:#b30000;
    font-weight:bold;
    box-sizing:border-box;
}

/* 🔥 TEXTAREA FIXED */
.comment-input {
    min-height:90px;
    resize:none;
}

/* ADDRESS ROW */
.address-row {
    display:flex;
    gap:10px;
}

.address-input {
    flex:1;
}

.location-btn {
    width:50px;
    border:none;
    border-radius:10px;
    background:#f5e6d3;
    cursor:pointer;
}

/* BUTTON */
#orderBtn {
    padding:14px;
    border:none;
    border-radius:10px;
    background:#f5e6d3;
    color:#ad0202;
    font-weight:bold;
    cursor:pointer;
}

/* CART ITEMS */
.receipt-item {
    display:flex;
    justify-content:space-between;
}

.qty-controls button {
    padding:5px;
}

.success-msg {
    background:#28a745;
    padding:10px;
    border-radius:8px;
    text-align:center;
}

</style>

</head>

<body>

<div class="header">
    <img src="images/logo.png" class="logo">
    <div id="authBtn" class="auth-btn">Login</div>
</div>

<div class="categories">
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="orders.html">Orders</a>
</div>

<h2 class="section-title">Your Cart</h2>

<!-- 🔥 TABS -->
<div class="type-tabs">
    <button id="deliveryTab" class="active" onclick="setType('delivery')">🚚 Delivery</button>
    <button id="pickupTab" onclick="setType('pickup')">🛍 Pickup</button>
</div>

<!-- CART -->
<div class="order-box" id="cart-items">
    <p>No items added yet</p>
</div>

<!-- FORM -->
<div class="order-box">

    <h2>Order Details</h2>

    <input class="name-input" placeholder="Your Name" oninput="saveForm()">
    <input class="phone-input" placeholder="Phone Number" oninput="saveForm()">

    <!-- DELIVERY ONLY -->
    <div id="deliveryFields">

        <div class="address-row">
            <input class="address-input" placeholder="Address" oninput="saveForm()">
            <button class="location-btn" onclick="getLocation()">📍</button>
        </div>

        <select onchange="saveForm()" class="payment-select">
            <option>Cash</option>
            <option>Card on Delivery</option>
        </select>

    </div>

    <textarea class="comment-input" placeholder="Add notes (no onions, extra sauce)" oninput="saveForm()"></textarea>

    <button id="orderBtn" onclick="placeOrder()">Place Order</button>

</div>

<script>

let orderType = "delivery";

/* 🔥 SWITCH */
function setType(type){
    orderType = type;

    document.getElementById("deliveryTab").classList.remove("active");
    document.getElementById("pickupTab").classList.remove("active");

    if(type === "delivery"){
        document.getElementById("deliveryTab").classList.add("active");
        document.getElementById("deliveryFields").style.display = "block";
    } else {
        document.getElementById("pickupTab").classList.add("active");
        document.getElementById("deliveryFields").style.display = "none";
    }

    saveForm();
}

/* FIREBASE */
const firebaseConfig = {
    apiKey: "AIzaSyA0NPkfK_jdoF95XAy0m_dHrFxmTyTr7kE",
    authDomain: "sizzle-oman.firebaseapp.com",
    projectId: "sizzle-oman",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

/* LOAD */
window.onload = function () {

    auth.onAuthStateChanged(user => {
        document.getElementById("authBtn").innerHTML = user ? "👤" : "Login";
    });

    const saved = JSON.parse(localStorage.getItem("orderForm"));
    if(saved){
        document.querySelector(".name-input").value = saved.name || "";
        document.querySelector(".phone-input").value = saved.phone || "";
        document.querySelector(".address-input").value = saved.address || "";
        document.querySelector(".comment-input").value = saved.comment || "";
        document.querySelector(".payment-select").value = saved.paymentType || "Cash";

        if(saved.orderType){
            setType(saved.orderType);
        }
    }

    loadCart();
};

/* CART */
function loadCart(){
    const cart = JSON.parse(localStorage.getItem("cart")) || {};
    const container = document.getElementById("cart-items");

    let html = "";
    let total = 0;

    for(let id in cart){
        const item = cart[id];
        const t = item.qty * item.price;
        total += t;

        html += `<div class="receipt-item">
            <span>${item.qty}x ${id}</span>
            <span>${t.toFixed(2)} OMR</span>
        </div>`;
    }

    html += `<hr>Total: ${(total*1.05).toFixed(2)} OMR`;

    container.innerHTML = html || "No items";
}

/* SAVE */
function saveForm(){
    localStorage.setItem("orderForm", JSON.stringify({
        name:document.querySelector(".name-input").value,
        phone:document.querySelector(".phone-input").value,
        address:document.querySelector(".address-input")?.value || "",
        comment:document.querySelector(".comment-input").value,
        paymentType:document.querySelector(".payment-select")?.value || "",
        orderType
    }));
}

/* LOCATION */
function getLocation(){
    navigator.geolocation.getCurrentPosition(pos=>{
        document.querySelector(".address-input").value =
        `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
        saveForm();
    });
}

/* ORDER */
async function placeOrder(){

    const cart = JSON.parse(localStorage.getItem("cart")) || {};

    const name = document.querySelector(".name-input").value;
    const phone = document.querySelector(".phone-input").value;
    const address = document.querySelector(".address-input").value;
    const paymentType = document.querySelector(".payment-select").value;
    const comment = document.querySelector(".comment-input").value;

    if(!name || !phone){
        alert("Fill required fields");
        return;
    }

    if(orderType === "delivery" && !address){
        alert("Address required");
        return;
    }

    await db.collection("orders").add({
        name,
        phone,
        address: orderType==="delivery"?address:"",
        paymentType: orderType==="delivery"?paymentType:"",
        comment,
        cart,
        orderType,
        time:new Date()
    });

    alert("Order placed");

    localStorage.removeItem("cart");
    localStorage.removeItem("orderForm");

    loadCart();
}

</script>

</body>
</html>
