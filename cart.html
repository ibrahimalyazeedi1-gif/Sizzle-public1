<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>Sizzle - Cart</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>

/* 🔴 BASE */
body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#d9c3a3;
}

/* 🔴 HEADER */
.header {
    background:#ad0202;
    padding:20px;
    text-align:center;
    position:relative;
}

.logo {
    height:70px;
    display:block;
    margin:0 auto;
}

/* LOGIN */
.auth-btn {
    position:absolute;
    top:15px;
    right:15px;
    background:#f5e6d3;
    color:#ad0202;
    padding:10px 16px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* NAV */
.categories {
    display:flex;
    justify-content:center;
    gap:10px;
    background:#7a0000;
    padding:10px;
}

.categories a {
    color:white;
    text-decoration:none;
    color: #f5e6d3;
    padding:8px 14px;
    border-radius:20px;
}

/* TITLE */
.section-title {
    text-align:center;
    margin-top:15px;
}

/* 🔥 TABS FIXED */
.type-tabs {
    display:flex;
    width:90%;
    max-width:450px;
    margin:15px auto;
    border-radius:12px;
    overflow:hidden;
    background:#ccc;
}

.type-tabs button {
    flex:1;
    padding:10px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    background:transparent;
}

.type-tabs .active {
    background:#ad0202;
    color:white;
}

/* 🔥 ORDER BOX */
.order-box {
    width:90%;
    max-width:450px;
    margin:15px auto;
    background:#7a0000;
    padding:15px;
    border-radius:12px;
    color:white;

    display:flex;
    flex-direction:column;
    gap:12px;
}

/* INPUTS */
.order-box input,
.order-box select,
.comment-input {
    width:100%;
    padding:14px;
    border-radius:10px;
    border:none;
    background:#f5e6d3;
    color:#b30000;
    font-weight:bold;
    box-sizing:border-box;
}

/* 🔥 TEXTAREA FIXED */
.comment-input {
    min-height:90px;
    resize:none;
}

/* ADDRESS ROW */
.address-row {
    margin-bottom: 10px;
    display:flex;
    gap:10px;
}

.address-input {
    flex:1;
}

.location-btn {
    width:50px;
    border:none;
    border-radius:10px;
    background:#f5e6d3;
    cursor:pointer;
}

/* BUTTON */
#orderBtn {
    margin-top: 10px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#f5e6d3;
    color:#ad0202;
    font-weight:bold;
    cursor:pointer;
}

/* CART ITEMS */
.receipt-item {
    display:flex;
    justify-content:space-between;
}

.qty-controls button {
    padding:5px;
}

.success-msg {
    background:#28a745;
    padding:10px;
    border-radius:8px;
    text-align:center;
}

#toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #28a745;
    color: white;
    padding: 14px 20px;
    border-radius: 10px;
    font-weight: bold;
    opacity: 0;
    transition: all 0.4s ease;
    z-index: 999;
}

#toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}    
</style>

</head>

<body>

<div class="header">
    <img src="images/logo.png" class="logo">
    <div id="authBtn" class="auth-btn" data-key="login">Login</div>

    <div id="langBtn" style="
        position: absolute;
        top: 15px;
        left: 15px;
        background: #f5e6d3;
        color: #ad0202;
        padding: 10px 16px;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
    ">
    EN
    </div>
</div>

<div class="categories">
    <a href="index.html" data-key="home">Home</a>
    <a href="cart.html" data-key="cart">Cart</a>
    <a href="orders.html" data-key="orders">Orders</a>
</div>

<h2 class="section-title" data-key="your_cart">Your Cart</h2>

<!-- 🔥 TABS -->
<div class="type-tabs">
    <button id="deliveryTab" class="active" onclick="setType('delivery')" data-key="delivery">🚚 Delivery</button>
    <button id="pickupTab" onclick="setType('pickup')" data-key="pickup">🛍 Pickup</button>
</div>

<!-- CART -->
<div class="order-box" id="cart-items">
    <p data-key="empty_cart">No items added yet</p>
</div>

<!-- FORM -->
<div class="order-box">

    <h2 data-key="order_details">Order Details</h2>

    <input class="name-input" placeholder="Your Name" data-key-placeholder="name" oninput="saveForm()">
    <input class="phone-input" placeholder="Phone Number" data-key-placeholder="phone" oninput="saveForm()">

    <!-- DELIVERY ONLY -->
    <div id="deliveryFields">

        <div class="address-row">
            <input class="address-input" placeholder="Address" data-key-placeholder="address" oninput="saveForm()">
            <button class="location-btn" onclick="getLocation()">📍</button>
        </div>

        <select onchange="saveForm()" class="payment-select">
            <option data-key="cash">Cash</option>
            <option data-key="card">Card on Delivery</option>
        </select>

    </div>

    <textarea class="comment-input" placeholder="Add notes (no onions, extra sauce)" data-key-placeholder="notes" oninput="saveForm()"></textarea>

    <button id="orderBtn" onclick="placeOrder()" data-key="place_order">Place Order</button>
    <div id="toast"></div>

</div>

<script>
let currentLang = "en";

const translations = {
    en: {
        home: "Home",
        cart: "Cart",
        orders: "Orders",
        your_cart: "Your Cart",
        delivery: "🚚 Delivery",
        pickup: "🛍 Pickup",
        order_details: "Order Details",
        place_order: "Place Order",

        empty_cart: "No items added yet",
        subtotal: "Subtotal",
        tax: "Tax (5%)",
        delivery_fee: "Delivery",
        total: "Total",
        
        name: "Your Name",
        phone: "Phone Number",
        address: "Address",
        notes: "Add notes (no onions, extra sauce)"
    },

    ar: {
        home: "الرئيسية",
        cart: "السلة",
        orders: "الطلبات",
        your_cart: "سلتك",
        delivery: "توصيل",
        pickup: "استلام",
        order_details: "تفاصيل الطلب",
        place_order: "إرسال الطلب",

        empty_cart: "لا توجد عناصر بعد",
        subtotal: "المجموع",
        tax: "الضريبة (٥٪)",
        delivery_fee: "التوصيل",
        total: "الإجمالي",
        
        name: "الاسم",
        phone: "رقم الهاتف",
        address: "العنوان",
        notes: "ملاحظات (بدون بصل، صوص إضافي)"
    }
};

document.getElementById("langBtn").onclick = function () {
    currentLang = currentLang === "en" ? "ar" : "en";

    this.innerHTML = currentLang === "en" ? "EN" : "AR";

    document.body.style.direction = currentLang === "ar" ? "rtl" : "ltr";

    loadCart();          // rebuild cart
    applyTranslations(); // then translate everything
};
</script>
    
<script>

let orderType = "delivery";

/* 🔥 SWITCH */
function setType(type){
    orderType = type;

    document.getElementById("deliveryTab").classList.remove("active");
    document.getElementById("pickupTab").classList.remove("active");

    if(type === "delivery"){
        document.getElementById("deliveryTab").classList.add("active");
        document.getElementById("deliveryFields").style.display = "block";
    } else {
        document.getElementById("pickupTab").classList.add("active");
        document.getElementById("deliveryFields").style.display = "none";
    }

    loadCart();   // 🔥 IMPORTANT (updates price instantly)
    saveForm();
}

/* FIREBASE */
const firebaseConfig = {
    apiKey: "AIzaSyA0NPkfK_jdoF95XAy0m_dHrFxmTyTr7kE",
    authDomain: "sizzle-oman.firebaseapp.com",
    projectId: "sizzle-oman",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

/* LOAD */
window.onload = function () {

    const btn = document.getElementById("authBtn");

    auth.onAuthStateChanged(user => {
        btn.innerHTML = user ? "👤" : "Login";
    });

    // ✅ THIS WAS MISSING
    btn.onclick = function () {
        if (auth.currentUser) {
            window.location.href = "profile.html";
        } else {
            window.location.href = "login.html";
        }
    };

    const saved = JSON.parse(localStorage.getItem("orderForm"));
    if(saved){
        document.querySelector(".name-input").value = saved.name || "";
        document.querySelector(".phone-input").value = saved.phone || "";
        document.querySelector(".address-input").value = saved.address || "";
        document.querySelector(".comment-input").value = saved.comment || "";
        document.querySelector(".payment-select").value = saved.paymentType || "Cash";

        if(saved.orderType){
            setType(saved.orderType);
        }
    }

    loadCart();
};

/* CART */
function loadCart() {

    let cart = JSON.parse(localStorage.getItem("cart")) || {};

    // ✅ REMOVE INVALID ITEMS
    Object.keys(cart).forEach(id => {
        if (!cart[id] || cart[id].qty <= 0) {
            delete cart[id];
        }
    });
    
    // ✅ SAVE CLEAN CART
    localStorage.setItem("cart", JSON.stringify(cart));
    
    const container = document.getElementById("cart-items");

    container.innerHTML = "";

    let subtotal = 0;
    const items = Object.entries(cart);

    if (items.length === 0) {
        const t = translations[currentLang];
        container.innerHTML = `<p data-key="empty_cart">${t.empty_cart}</p>`;
        return;
    }

    let html = "";

    items.forEach(([id, data]) => {

        if (!data || !data.qty || !data.price) return;

        const itemTotal = data.qty * data.price;
        subtotal += itemTotal;

        html += `
        <div class="receipt-item">
            <div class="receipt-left">
                <span>${id.replace(/_/g, " ")}</span>
            </div>

            <div class="receipt-right">
                <div class="qty-controls">
                    <button onclick="changeCartQty('${id}', -1)">-</button>
                    <span>${data.qty}</span>
                    <button onclick="changeCartQty('${id}', 1)">+</button>
                </div>
                <span class="item-total">${itemTotal.toFixed(2)} OMR</span>
            </div>
        </div>
        `;
    });

    const tax = Math.round(subtotal * 0.05 * 100) / 100;

    // 🔥 DELIVERY FEE LOGIC
    let deliveryFee = 0;
    if (orderType === "delivery") {
        deliveryFee = 0.6;
    }

    const total = Math.round((subtotal + tax + deliveryFee) * 100) / 100;

    const t = translations[currentLang];
    
    html += `
    <div class="receipt-summary">
        <div class="summary-row">
            <span>${t.subtotal}</span>
            <span>${subtotal.toFixed(2)} OMR</span>
        </div>
    
        <div class="summary-row">
            <span>${t.tax}</span>
            <span>${tax.toFixed(2)} OMR</span>
        </div>
    
        ${
            orderType === "delivery"
            ? `<div class="summary-row">
                <span>${t.delivery_fee}</span>
                <span>${deliveryFee.toFixed(2)} OMR</span>
              </div>`
            : ""
        }
    
        <div class="summary-row total">
            <span>${t.total}</span>
            <span>${total.toFixed(2)} OMR</span>
        </div>
    </div>
    `;

    container.innerHTML = html;
    applyTranslations();
}

function applyTranslations() {

    const t = translations[currentLang];

    // TEXT
    document.querySelectorAll("[data-key]:not(#authBtn)").forEach(el => {
        const key = el.getAttribute("data-key");
        if (t[key]) {
            el.innerHTML = t[key];
        }
    });

    // PLACEHOLDERS
    document.querySelectorAll("[data-key-placeholder]").forEach(el => {
        const key = el.getAttribute("data-key-placeholder");
        if (t[key]) {
            el.placeholder = t[key];
        }
    });
}

function changeCartQty(id, change) {

    let cart = JSON.parse(localStorage.getItem("cart")) || {};

    if (!cart[id]) return;

    cart[id].qty += change;

    // remove item if 0
    if (cart[id].qty <= 0) {
        delete cart[id];
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    loadCart(); // 🔥 refresh UI
}

/* LOCATION */
function getLocation(){
    navigator.geolocation.getCurrentPosition(pos=>{
        document.querySelector(".address-input").value =
        `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
        saveForm();
    });
}

/* ORDER */
async function placeOrder(){

    const cart = JSON.parse(localStorage.getItem("cart")) || {};

    // ✅ FIX: remove items with qty <= 0
    const cleanedCart = {};
    Object.keys(cart).forEach(id => {
        if (cart[id] && cart[id].qty > 0) {
            cleanedCart[id] = cart[id];
        }
    });

    // ✅ FIX: block empty cart
    if (Object.keys(cleanedCart).length === 0) {
        document.getElementById("cart-items").innerHTML =
        const t = translations[currentLang];
        document.getElementById("cart-items").innerHTML =
        `<p style='font-weight: bold; color: white;' data-key="empty_cart">${t.empty_cart}</p>`;
        return;
    }

    const name = document.querySelector(".name-input").value;
    const phone = document.querySelector(".phone-input").value;
    const address = document.querySelector(".address-input").value;
    const paymentType = document.querySelector(".payment-select").value;
    const comment = document.querySelector(".comment-input").value;

    if(!name || !phone){
        alert("Fill required fields");
        return;
    }

    if(orderType === "delivery" && !address){
        alert("Address required");
        return;
    }

    await db.collection("orders").add({
        name,
        phone,
        address: orderType==="delivery"?address:"",
        paymentType: orderType==="delivery"?paymentType:"",
        comment,
        cart: cleanedCart, // ✅ use cleaned cart
        orderType,
        deliveryFee: orderType==="delivery" ? 0.6 : 0,
        time:new Date()
    });

    showToast("✅ Order placed successfully");

    localStorage.removeItem("cart");
    localStorage.removeItem("orderForm");

    loadCart();
}

function showToast(message) {
    const toast = document.getElementById("toast");
    toast.innerText = message;

    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2500);
}
</script>

</body>
</html>
